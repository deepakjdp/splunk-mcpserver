services:
  - type: web
    name: splunk-mcp-server
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py --transport sse --port 8000 --host 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SPLUNK_HOST
        sync: false
      - key: SPLUNK_PORT
        value: 8089
      - key: SPLUNK_USERNAME
        sync: false
      - key: SPLUNK_PASSWORD
        sync: false
      - key: SPLUNK_SCHEME
        value: https
    healthCheckPath: /sse

